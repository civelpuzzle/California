<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой профиль — California</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

:root {
  --primary: #6C3FC5;
  --primary-dark: #5A2FB0;
  --primary-light: #8B6FD9;
  --primary-lighter: #EDE7F6;
  --accent: #FF6B35;
  --bg-white: #FFFFFF;
  --bg-light: #F8F7FC;
  --bg-gray: #F0EEF5;
  --text-dark: #1A1A2E;
  --text-medium: #4A4A6A;
  --text-light: #8888A0;
  --border: #E0DCF0;
  --border-light: #F0EDF7;
  --shadow-sm: 0 1px 3px rgba(108,63,197,0.08);
  --shadow-md: 0 4px 12px rgba(108,63,197,0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --transition-fast: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-light);
  color: var(--text-dark);
  line-height: 1.5;
  display: flex;
  flex-direction: column;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; font-family: inherit; background: none; }

/* TOAST */
.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toast {
  background: #1A1A2E;
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: 0 8px 30px rgba(108,63,197,0.16);
  animation: slideIn 0.2s ease-out;
  max-width: 300px;
  backdrop-filter: blur(8px);
  background: rgba(26, 26, 46, 0.95);
  border-left: 4px solid var(--primary);
}
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* HEADER */
.header {
  background: var(--bg-white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
}
.logo {
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav { display: flex; gap: 8px; }
.nav-link {
  padding: 8px 18px;
  font-weight: 600;
  color: var(--text-medium);
  border-radius: var(--radius-sm);
  transition: var(--transition-fast);
}
.nav-link:hover, .nav-link.active {
  color: var(--primary);
  background: var(--primary-lighter);
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}
#authButtons {
  display: flex;
  gap: 12px;
}
.header-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-weight: 600;
  color: var(--text-medium);
  border-radius: var(--radius-sm);
  position: relative;
}
.header-btn:hover { background: var(--primary-lighter); color: var(--primary); }
.cart-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--accent);
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: scale(0);
  transition: transform 0.2s;
}
.cart-badge.visible { transform: scale(1); }
.btn-login, .btn-register {
  padding: 8px 18px;
  font-weight: 600;
  border-radius: var(--radius-sm);
}
.btn-login { background: var(--primary-lighter); color: var(--primary); }
.btn-login:hover { background: var(--primary-light); color: white; }
.btn-register { background: var(--primary); color: white; }
.btn-register:hover { background: var(--primary-dark); }
.user-greeting {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--primary-lighter);
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.user-greeting:hover {
  background: var(--primary-light);
  color: white;
}
.user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
}

/* MAIN */
.main-content {
  flex: 1;
  max-width: 1200px;
  margin: 40px auto;
  padding: 0 24px;
  width: 100%;
}
.profile-header {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 40px;
  background: var(--bg-white);
  padding: 30px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.profile-avatar-large {
  width: 100px;
  height: 100px;
  background: var(--primary);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  font-weight: 700;
}
.profile-info h1 {
  font-size: 1.8rem;
  margin-bottom: 8px;
}
.profile-info p {
  color: var(--text-light);
}
.profile-actions {
  display: flex;
  gap: 16px;
  margin-top: 16px;
}
.profile-action-btn {
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  transition: var(--transition-fast);
}
.btn-logout {
  background: var(--bg-gray);
  color: var(--text-medium);
}
.btn-logout:hover {
  background: var(--border);
}
.btn-delete {
  background: #fee2e2;
  color: #dc2626;
}
.btn-delete:hover {
  background: #fecaca;
}
.orders-section {
  background: var(--bg-white);
  border-radius: var(--radius-lg);
  padding: 30px;
  box-shadow: var(--shadow-sm);
}
.orders-section h2 {
  margin-bottom: 24px;
  font-size: 1.4rem;
}
.orders-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.order-card {
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 20px;
  transition: var(--transition-fast);
}
.order-card:hover {
  box-shadow: var(--shadow-md);
}
.order-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.order-id {
  font-weight: 700;
  color: var(--primary);
}
.order-date {
  color: var(--text-light);
  font-size: 0.85rem;
}
.order-details {
  margin: 12px 0;
  padding: 12px 0;
  border-top: 1px solid var(--border-light);
  border-bottom: 1px solid var(--border-light);
}
.order-items {
  font-size: 0.9rem;
  color: var(--text-medium);
}
.order-total {
  font-weight: 800;
  font-size: 1.1rem;
  text-align: right;
}
.empty-orders {
  text-align: center;
  padding: 40px;
  color: var(--text-light);
}
.empty-orders a {
  color: var(--primary);
  text-decoration: underline;
}

/* CART DRAWER */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 1000;
  visibility: hidden;
  opacity: 0;
  transition: 0.25s;
}
.drawer-overlay.active { visibility: visible; opacity: 1; }
.cart-drawer {
  position: fixed;
  right: 0;
  top: 0;
  width: 420px;
  max-width: 90vw;
  height: 100%;
  background: var(--bg-white);
  box-shadow: 0 12px 40px rgba(108,63,197,0.2);
  z-index: 1001;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  display: flex;
  flex-direction: column;
}
.drawer-overlay.active .cart-drawer { transform: translateX(0); }
.drawer-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.drawer-items {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.drawer-total {
  padding: 20px;
  border-top: 1px solid var(--border);
  font-weight: 800;
}
.modal-close {
  width: 32px;
  height: 32px;
  background: var(--bg-gray);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition-fast);
}
.modal-close:hover {
  background: var(--border);
}

/* МОДАЛЬНЫЕ ОКНА (точь-в-точь как в catalog.html) */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
  transition: 0.2s;
}
.modal-overlay.active { visibility: visible; opacity: 1; }
.modal {
  background: var(--bg-white);
  border-radius: var(--radius-lg);
  position: relative;
}
.auth-modal {
  max-width: 420px;
  width: 90%;
  padding: 28px;
}
.auth-modal h2 {
  margin-bottom: 16px;
  color: var(--primary);
}
.auth-modal input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 1rem;
}
.auth-modal input:focus {
  outline: none;
  border-color: var(--primary);
}
.auth-modal button[type="submit"] {
  width: 100%;
  padding: 12px;
  background: var(--primary);
  color: white;
  border-radius: var(--radius-sm);
  font-weight: 700;
  margin-top: 12px;
  transition: var(--transition-fast);
}
.auth-modal button[type="submit"]:hover {
  background: var(--primary-dark);
}
.auth-modal .modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  background: var(--bg-gray);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.auth-modal .modal-close:hover {
  background: var(--border);
}

/* FOOTER */
.footer {
  background: var(--text-dark);
  color: rgba(255,255,255,0.7);
  padding: 48px 24px 24px;
  margin-top: 60px;
  text-align: center;
}
.footer a {
  color: rgba(255,255,255,0.7);
}
.footer a:hover {
  color: white;
}

@media (max-width: 768px) {
  .profile-header { flex-direction: column; text-align: center; }
  .profile-actions { justify-content: center; }
  .order-header { flex-direction: column; align-items: flex-start; gap: 8px; }
}

.logotype {
  width: 65px;
  height: 65px;
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<header class="header">
  <div class="header-top">
    <a href="catalog.html" class="logo">
      <img src="../assets/logoNoFone.png" alt="logo" class="logotype">
      California
    </a>
    <nav class="nav">
      <a href="catalog.html" class="nav-link">Все товары</a>
      <a href="promotions.html" class="nav-link">Акции</a>
    </nav>
    <div class="header-actions">
      <button class="header-btn" id="cartIconBtn">
        <svg width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>Корзина</span>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <div id="authButtons">
        <button class="btn-login" onclick="openAuthModal('login')">Вход</button>
        <button class="btn-register" onclick="openAuthModal('register')">Регистрация</button>
      </div>
      <div id="userGreeting" style="display:none;" class="user-greeting" onclick="goToProfile()">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userName">User</span>
      </div>
    </div>
  </div>
</header>

<main class="main-content" id="profileContent">
  <!-- Контент загружается JS -->
</main>

<!-- CART DRAWER -->
<div class="drawer-overlay" id="cartDrawerOverlay">
  <div class="cart-drawer">
    <div class="drawer-header">
      <h3>Корзина</h3>
      <button class="modal-close" onclick="closeCartDrawer()">✕</button>
    </div>
    <div id="drawerItems" class="drawer-items"></div>
    <div id="drawerTotal" class="drawer-total"></div>
  </div>
</div>

<!-- AUTH MODAL (точная копия из catalog.html) -->
<div class="modal-overlay" id="authModal">
  <div class="modal auth-modal">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>
    <h2 id="authTitle">Вход</h2>
    <form id="authForm" onsubmit="handleAuth(event)">
      <input type="text" id="authLogin" placeholder="Логин" required>
      <input type="password" id="authPassword" placeholder="Пароль" required>
      <button type="submit" id="authSubmitBtn">Войти</button>
    </form>
    <p id="authSwitch" style="margin-top:16px; text-align:center;">Нет аккаунта? <a onclick="switchAuthMode()" style="color:var(--primary); cursor:pointer;">Зарегистрироваться</a></p>
  </div>
</div>

<footer class="footer">
  <div>© 2026 California — интернет-магазин электроники Apple</div>
  <div style="margin-top: 12px;">
    <a href="agreement.html">Пользовательское соглашение</a> | 
    <a href="catalog.html">Каталог</a> | 
    <a href="promotions.html">Акции</a>
  </div>
</footer>

<script>
// TOAST
function showToast(message, duration = 3000) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerText = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// Корзина
let cart = [];
function loadCart() {
  try {
    const saved = localStorage.getItem('california_cart');
    if (saved) cart = JSON.parse(saved);
  } catch(e) { cart = []; }
  updateCartBadge();
}
function updateCartBadge() {
  const count = cart.reduce((s,i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = count;
  badge.classList.toggle('visible', count > 0);
}
function renderCartDrawer() {
  const container = document.getElementById('drawerItems');
  const totalContainer = document.getElementById('drawerTotal');
  if (!cart.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;">Корзина пуста</div>';
    totalContainer.innerHTML = '';
    return;
  }
  let itemsHtml = cart.map(item => `
    <div style="display:flex; gap:12px; margin-bottom:16px; padding:12px; background:var(--bg-light); border-radius:8px;">
      <div style="width:60px;height:60px;background:var(--bg-gray);display:flex;align-items:center;justify-content:center;border-radius:8px;"><img src="${item.image}" style="max-height:50px;"></div>
      <div style="flex:1"><div style="font-weight:600;">${item.name}</div><div>${item.price?.toLocaleString()} ₽</div><div>Кол-во: ${item.qty}</div></div>
    </div>
  `).join('');
  container.innerHTML = itemsHtml;
  const total = cart.reduce((s,i) => s + (i.price||0) * i.qty, 0);
  totalContainer.innerHTML = `<div style="display:flex;justify-content:space-between;"><span>Итого:</span><span>${total.toLocaleString()} ₽</span></div>`;
}
function openCartDrawer() {
  renderCartDrawer();
  document.getElementById('cartDrawerOverlay').classList.add('active');
}
function closeCartDrawer() { document.getElementById('cartDrawerOverlay').classList.remove('active'); }
document.getElementById('cartIconBtn').onclick = openCartDrawer;

// Авторизация и профиль
let currentUser = null;
let authMode = 'login';

function loadUser() {
  try {
    const saved = localStorage.getItem('california_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      updateAuthUI();
      renderProfilePage();
    } else {
      // Если не авторизован — редирект на каталог
      window.location.href = 'catalog.html';
    }
  } catch(e) { 
    window.location.href = 'catalog.html';
  }
}

function updateAuthUI() {
  const authDiv = document.getElementById('authButtons');
  const greetDiv = document.getElementById('userGreeting');
  if (currentUser) {
    authDiv.style.display = 'none';
    greetDiv.style.display = 'flex';
    document.getElementById('userName').textContent = currentUser.login;
    document.getElementById('userAvatar').textContent = currentUser.login.charAt(0).toUpperCase();
  } else {
    authDiv.style.display = 'flex';
    greetDiv.style.display = 'none';
  }
}

function goToProfile() {
  if (currentUser) {
    window.location.href = 'profile.html';
  } else {
    showToast('Сначала войдите в аккаунт');
  }
}

function openAuthModal(mode) {
  authMode = mode;
  document.getElementById('authTitle').textContent = mode === 'login' ? 'Вход' : 'Регистрация';
  document.getElementById('authSubmitBtn').textContent = mode === 'login' ? 'Войти' : 'Зарегистрироваться';
  document.getElementById('authModal').classList.add('active');
}
function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); }
function switchAuthMode() { openAuthModal(authMode === 'login' ? 'register' : 'login'); }

function handleAuth(e) {
  e.preventDefault();
  const login = document.getElementById('authLogin').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!login || !password) {
    showToast('Заполните все поля');
    return;
  }
  currentUser = { login: login };
  localStorage.setItem('california_user', JSON.stringify(currentUser));
  updateAuthUI();
  closeAuthModal();
  showToast(`Добро пожаловать, ${login}!`);
  renderProfilePage();
}

function logoutUser() {
  if (currentUser) {
    currentUser = null;
    localStorage.removeItem('california_user');
    updateAuthUI();
    showToast('Вы вышли из аккаунта');
    // Редирект на каталог
    window.location.href = 'catalog.html';
  }
}

function deleteAccount() {
  if (!currentUser) return;
  if (confirm('Вы уверены, что хотите удалить аккаунт? Все данные будут потеряны.')) {
    localStorage.removeItem('california_user');
    localStorage.removeItem('california_cart');
    cart = [];
    updateCartBadge();
    currentUser = null;
    updateAuthUI();
    showToast('Аккаунт удалён');
    window.location.href = 'catalog.html';
  }
}

function renderProfilePage() {
  if (!currentUser) return; // редирект уже произошёл в loadUser
  
  let orders = [];
  try {
    const savedOrders = localStorage.getItem('california_orders');
    if (savedOrders) {
      const allOrders = JSON.parse(savedOrders);
      orders = allOrders.filter(order => order.user === currentUser.login);
      orders.sort((a,b) => b.id - a.id);
    }
  } catch(e) {}
  
  const ordersHtml = orders.length === 0 ? `
    <div class="empty-orders">
      <p>У вас пока нет заказов.</p>
      <a href="catalog.html">Перейти в каталог →</a>
    </div>
  ` : orders.map(order => `
    <div class="order-card">
      <div class="order-header">
        <span class="order-id">Заказ №${order.id}</span>
        <span class="order-date">${order.date}</span>
      </div>
      <div class="order-details">
        <div><strong>Получатель:</strong> ${order.name}</div>
        <div><strong>Телефон:</strong> ${order.phone}</div>
        <div><strong>Email:</strong> ${order.email}</div>
        <div><strong>Адрес:</strong> ${order.address}</div>
        <div class="order-items" style="margin-top:12px;"><strong>Товары:</strong><br>
          ${order.items.map(item => `• ${item.name} × ${item.qty} — ${(item.price * item.qty).toLocaleString()} ₽`).join('<br>')}
        </div>
      </div>
      <div class="order-total">Итого: ${order.total.toLocaleString()} ₽</div>
    </div>
  `).join('');
  
  const container = document.getElementById('profileContent');
  container.innerHTML = `
    <div class="profile-header">
      <div class="profile-avatar-large">${currentUser.login.charAt(0).toUpperCase()}</div>
      <div class="profile-info">
        <h1>${currentUser.login}</h1>
        <p>Логин: ${currentUser.login}</p>
        <div class="profile-actions">
          <button class="profile-action-btn btn-logout" onclick="logoutUser()">Выйти из аккаунта</button>
          <button class="profile-action-btn btn-delete" onclick="deleteAccount()">Удалить аккаунт</button>
        </div>
      </div>
    </div>
    <div class="orders-section">
      <h2>История заказов</h2>
      <div class="orders-list">
        ${ordersHtml}
      </div>
    </div>
  `;
}

// Синхронизация между вкладками
window.addEventListener('storage', (e) => {
  if (e.key === 'california_user') loadUser();
  if (e.key === 'california_cart') loadCart();
});

loadCart();
loadUser();
</script>
</body>
</html>
